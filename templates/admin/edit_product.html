{% extends "base.html" %}

{% block title %}Edit Product{% endblock %}

{% block content %}

<div class="admin-page-header">
    <h1><i class="fas fa-edit me-2" style="color:#fbbf24;"></i>Edit Product</h1>
    <p>Update the details for <strong style="color:#c084fc;">{{ product.name }}</strong></p>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-box me-2"></i>{{ product.name }}</h5>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="name" class="form-label">Product Name *</label>
                            <input type="text" class="form-control" id="name" name="name"
                                   value="{{ product.name }}" required>
                        </div>
                        <div class="col-md-6">
                            <label for="category" class="form-label">Category *</label>
                            <input type="text" class="form-control" id="category" name="category"
                                   value="{{ product.category }}" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="price" class="form-label">Price (₹) *</label>
                            <input type="number" step="0.01" class="form-control"
                                   id="price" name="price" value="{{ product.price }}" required>
                        </div>
                        <div class="col-md-4">
                            <label for="original_price" class="form-label">Original Price (₹)</label>
                            <input type="number" step="0.01" class="form-control"
                                   id="original_price" name="original_price"
                                   value="{{ product.original_price or '' }}" placeholder="Optional">
                        </div>
                        <div class="col-md-4">
                            <label for="stock" class="form-label">Stock *</label>
                            <input type="number" class="form-control"
                                   id="stock" name="stock" value="{{ product.stock }}" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="unit" class="form-label">Unit *</label>
                            <select class="form-select" id="unit" name="unit" required>
                                <option value="kg"     {% if product.unit == 'kg' %}selected{% endif %}>kg</option>
                                <option value="g"      {% if product.unit == 'g' %}selected{% endif %}>g</option>
                                <option value="piece"  {% if product.unit == 'piece' %}selected{% endif %}>piece</option>
                                <option value="packet" {% if product.unit == 'packet' %}selected{% endif %}>packet</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description"
                                  rows="3">{{ product.description }}</textarea>
                    </div>

                    <!-- Current Image -->
                    <div class="mb-3">
                        <label class="form-label">Current Image</label>
                        <div>
                            {% if product.image_url %}
                                <img src="{{ product.image_url }}"
                                     style="max-height:100px; border-radius:10px;
                                            border:2px solid rgba(147,51,234,0.3);">
                            {% else %}
                                <div style="width:80px; height:80px; background:#111318;
                                            border:2px dashed rgba(147,51,234,0.3);
                                            border-radius:10px; display:flex;
                                            align-items:center; justify-content:center;">
                                    <i class="fas fa-image" style="color:rgba(192,132,252,0.4); font-size:1.5rem;"></i>
                                </div>
                            {% endif %}
                        </div>
                    </div>

                    <!-- Change Image -->
                    <div class="mb-3">
                        <label for="image" class="form-label">Change Image <span style="color:rgba(255,255,255,0.4);">(optional)</span></label>
                        <input type="file" class="form-control" id="image" name="image" accept="image/*">
                        <div class="form-text">
                            <i class="fas fa-info-circle me-1"></i>Leave empty to keep the current image.
                        </div>
                    </div>

                    <!-- New Image Preview -->
                    <div class="mb-3" id="image-preview" style="display:none;">
                        <label class="form-label">New Image Preview</label><br>
                        <img src="#" alt="Preview" class="img-thumbnail" style="max-height:150px;">
                    </div>

                    <!-- Actions -->
                    <div class="d-flex gap-3 mt-4">
                        <button type="submit" class="btn btn-warning">
                            <i class="fas fa-save"></i> Update Product
                        </button>
                        <a href="{{ url_for('admin_products') }}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('image').addEventListener('change', function(e) {
    const preview = document.getElementById('image-preview');
    const img = preview.querySelector('img');
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            img.src = e.target.result;
            preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
    } else {
        preview.style.display = 'none';
    }
});
</script>

{% endblock %}
